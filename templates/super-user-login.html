<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super User Login | One Roof</title>

<style>
:root {
    --primary: #0a3d62;
    --accent: #00a8ff;
    --bg1: #0a3d62;
    --bg2: #1e5f9c;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
}

/* GLASS LOGIN BOX */
.box {
    width: 380px;
    padding: 35px;
    border-radius: 14px;
    background: rgba(255,255,255,0.95);
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    backdrop-filter: blur(10px);
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 22px;
    color: var(--primary);
    font-size: 22px;
    letter-spacing: 0.5px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: 0.2s;
    font-size: 14px;
}

input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,168,255,0.15);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #08304a;
}

/* LINKS */
.links {
    margin-top: 18px;
    text-align: center;
}

.links a {
    text-decoration: none;
    color: var(--primary);
    font-weight: 600;
    font-size: 13px;
}

.links a:hover {
    text-decoration: underline;
}

/* SYSTEM NOTICE */
.note {
    margin-top: 12px;
    text-align: center;
    font-size: 12px;
    color: #666;
    border-top: 1px solid #eee;
    padding-top: 10px;
}

/* SECURITY BADGE */
.badge {
    text-align: center;
    margin-bottom: 15px;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
}
</style>
</head>

<body>

<div class="box">

    <div class="badge">RESTRICTED GOVERNMENT ACCESS SYSTEM</div>

    <h2>Super User Access</h2>

    <form method="POST">

        <input type="text" name="username" placeholder="Enter Admin Username" required>

        <input type="password" name="password" placeholder="Enter Secure Password" required>

        <button type="submit">Authenticate</button>

    </form>

    <div class="links">
        <a href="/">← Return to Home</a>
    </div>

    <div class="note">
        One Roof Ministry System • Authorized Personnel Only
    </div>

</div>

</body>
</html>
